services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: ecommerce-api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: production
      PORT: 4000
      LOG_LEVEL: info
      DATABASE_URL: postgresql://ecommerce:ecommerce@postgres:5432/ecommerce?schema=public
      REDIS_URL: redis://redis:6379
      FRONTEND_DIST_PATH: ../public
      APP_URL: http://localhost:5173
      API_URL: http://localhost:4000
      CLERK_JWKS_URL: ${CLERK_JWKS_URL:-https://example.clerk.accounts.dev/.well-known/jwks.json}
      CLERK_ISSUER: ${CLERK_ISSUER:-https://example.clerk.accounts.dev}
      CLERK_AUDIENCE: ${CLERK_AUDIENCE:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_replace_me}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_replace_me}
      POSTMARK_SERVER_TOKEN: ${POSTMARK_SERVER_TOKEN:-}
      POSTMARK_FROM_EMAIL: ${POSTMARK_FROM_EMAIL:-}
    command: sh -c "pnpm prisma:deploy && node dist/server.js"
    ports:
      - "4000:4000"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: ecommerce-worker
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ecommerce:ecommerce@postgres:5432/ecommerce?schema=public
      REDIS_URL: redis://redis:6379
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_replace_me}
      POSTMARK_SERVER_TOKEN: ${POSTMARK_SERVER_TOKEN:-}
      POSTMARK_FROM_EMAIL: ${POSTMARK_FROM_EMAIL:-}
      WORKER_CONCURRENCY: 5
    command: sh -c "pnpm prisma migrate deploy --schema ../backend/prisma/schema.prisma && node dist/worker.js"

volumes:
  postgres_data:
  redis_data:
